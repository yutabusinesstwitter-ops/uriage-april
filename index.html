<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4月腰塚売上表 齋藤作</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
/* --- 省略なし（そのまま） --- */
:root {
  --navy:#0d1b3e; --blue:#1a3a7c; --accent:#e8b429;
  --yoso:#dce8ff; --jisseki:#d4f0e0; --zennen:#fef3cc;
  --kyaku:#fde2e8; --jinken:#ecdeff;
  --good:#1a7c3a; --bad:#c0392b; --bg:#f0f3f8;
  --shadow:0 2px 10px rgba(13,27,62,.12);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:#1a1a2e; font-size:12px; }

/* （CSSはそのままなので省略せず使ってOK） */
</style>
</head>

<body>

<!-- HTML本体はそのままなので省略せず使ってOK -->

<script>
const JIKYU = 1697;
const KEY   = 'koshizuka_apr2026_v6';

/* --- データ配列そのまま --- */
const YOSO = [ /* そのまま */ ];
const ZENNEN = [ /* そのまま */ ];

const ZN_CUM = ZENNEN.reduce((a,v,i)=>{ a.push((a[i-1]||0)+v); return a; },[]);
const YS_CUM = YOSO.reduce((a,r,i)=>{ a.push((a[i-1]||0)+r.uri); return a; },[]);

let store = {};
function load(){ try{ store=JSON.parse(localStorage.getItem(KEY)||'{}'); }catch{ store={}; } }
function save(){ localStorage.setItem(KEY,JSON.stringify(store)); }

function clearAll(){
  if(!confirm('全データをリセットしますか？')) return;
  store={}; localStorage.removeItem(KEY);
  document.querySelectorAll('input[type=number]').forEach(el=>el.value='');
  recalc();
}

function $(id){ return document.getElementById(id); }

/* --- buildTable / onDaily / onCum そのまま --- */

/* =========================
   🔥 修正版 recalc（重要）
========================= */
function recalc(){
  let prevCumU=0, prevCumJ=0;
  let finalCumU=0, finalCumJ=0, finalCumK=0;
  let aCumK=0, lastDay=0;

  YOSO.forEach((row,i)=>{
    const d=row.d, inp=store[d]||{};
    const uri=inp.uri||0, jikan=inp.jikan||0, kyaku=inp.kyaku||0;

    if(inp.kyaku!=null){ aCumK+=kyaku; finalCumK=aCumK; }

    let dCumU=null, dCumJ=null;

    if(inp.uri!=null){
      const auto = prevCumU + uri;
      dCumU = inp.cumUriM ? inp.cumUri : auto;
      lastDay=d;
    } else if(inp.cumUriM){
      dCumU = inp.cumUri;
    }

    if(inp.jikan!=null){
      const auto = prevCumJ + jikan;
      dCumJ = inp.cumJikanM ? inp.cumJikan : auto;
    } else if(inp.cumJikanM){
      dCumJ = inp.cumJikan;
    }

    if(dCumU!=null) prevCumU=dCumU;
    if(dCumJ!=null) prevCumJ=dCumJ;

    if(dCumU!=null) finalCumU=dCumU;
    if(dCumJ!=null) finalCumJ=dCumJ;

    // 人時売上
    $('jinji-'+d).textContent =
      (dCumU && dCumJ) ? (dCumU/dCumJ).toFixed(3) : '—';

    // 前年比・予想比
    if(dCumU){
      const zn=dCumU/ZN_CUM[i]*100;
      const ys=dCumU/YS_CUM[i]*100;
      $('zn-'+d).textContent=zn.toFixed(1)+'%';
      $('ys-'+d).textContent=ys.toFixed(1)+'%';
    }
  });

  updateSummary(finalCumU, finalCumJ, finalCumK, lastDay);
}

/* =========================
   🔥 完全修正版 summary
========================= */
function updateSummary(cumU,cumJ,cumK,lastDay){
  if(!lastDay) return;

  const znL = ZN_CUM[lastDay-1];
  const ysL = YS_CUM[lastDay-1];

  if(cumU){
    $('ft-uri').textContent = cumU.toLocaleString();
    $('ft-zn').textContent  = (cumU/znL*100).toFixed(1)+'%';
    $('ft-ys').textContent  = (cumU/ysL*100).toFixed(1)+'%';
  }

  if(cumJ){
    $('ft-jikan').textContent = cumJ.toLocaleString();
  }

  if(cumU && cumJ){
    $('ft-jinji').textContent = (cumU/cumJ).toFixed(3);
    $('ft-jk').textContent    = (cumJ*JIKYU/cumU*0.1).toFixed(1)+'%';
  }

  if(cumU && cumK){
    $('ft-tanka').textContent =
      Math.round(cumU*1000/cumK).toLocaleString();
  }
}

/* --- 今日表示 --- */
function updateTodayLbl(){
  const now=new Date();
  const dows=['日','月','火','水','木','金','土'];
  $('today-lbl').textContent=
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${dows[now.getDay()]}）`;
}

/* 初期化 */
load();
buildTable();
recalc();
updateTodayLbl();

</script>
</body>
</html>
