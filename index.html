<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4月腰塚売上表 齋藤作</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy:#0d1b3e; --blue:#1a3a7c; --accent:#e8b429;
  --yoso:#dce8ff; --jisseki:#d4f0e0; --zennen:#fef3cc;
  --kyaku:#fde2e8; --jinken:#ecdeff;
  --good:#1a7c3a; --bad:#c0392b; --bg:#f0f3f8;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  font-size:12px;
}

.tbl-wrap {
  overflow:auto;
  height:90vh;
}

/* ===== テーブル ===== */
table {
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
  background:#fff;
}

th,td {
  border:1px solid #ccc;
  padding:4px;
  text-align:center;
  white-space:nowrap;
}

/* ===== 🔥 ヘッダー固定 ===== */
thead th {
  position: sticky;
  z-index: 10;
}

/* 1段目 */
thead tr:first-child th {
  top: 0;
  background:#0d1b3e;
  color:#fff;
  z-index:20;
}

/* 2段目 */
thead tr:nth-child(2) th {
  top: 32px;
  background:#1a3a7c;
  color:#fff;
  z-index:15;
}

/* ===== 左固定（おまけ） ===== */
th:first-child, td:first-child {
  position: sticky;
  left: 0;
  background:#fff;
  z-index:25;
}

th:nth-child(2), td:nth-child(2) {
  position: sticky;
  left: 40px;
  background:#fff;
  z-index:25;
}

/* 色 */
.cy{background:#dce8ff;}
.cj{background:#d4f0e0;}
.cz{background:#fef3cc;}
.ck{background:#fde2e8;}
.cn{background:#ecdeff;}

</style>
</head>

<body>

<div class="tbl-wrap">
<table>

<thead>
<tr>
<th rowspan="2">日</th>
<th rowspan="2">曜</th>
<th colspan="3">予想</th>
<th colspan="5">実績</th>
<th colspan="4">売上対比</th>
<th colspan="2">客数</th>
<th colspan="2">人件費</th>
</tr>

<tr>
<th class="cy">売上</th><th class="cy">時間</th><th class="cy">人時</th>
<th class="cj">売上</th><th class="cj">累計</th><th class="cj">時間</th><th class="cj">累計</th><th class="cj">人時</th>
<th class="cz">前年</th><th class="cz">前年累計</th><th class="cz">前年比</th><th class="cz">予想比</th>
<th class="ck">客数</th><th class="ck">単価</th>
<th class="cn">日</th><th class="cn">累計</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>
</div>

<script>

/* ===== データ ===== */
const YOSO = [
  {d:1,dow:'水',uri:260,jikan:44},
  {d:2,dow:'木',uri:260,jikan:44},
  {d:3,dow:'金',uri:380,jikan:51},
  {d:4,dow:'土',uri:680,jikan:68},
  {d:5,dow:'日',uri:650,jikan:63}
];

/* ===== テーブル生成 ===== */
function build(){
  const tbody=document.getElementById('tbody');

  YOSO.forEach(r=>{
    const tr=document.createElement('tr');

    tr.innerHTML=`
      <td>${r.d}</td>
      <td>${r.dow}</td>
      <td class="cy">${r.uri}</td>
      <td class="cy">${r.jikan}</td>
      <td class="cy">${(r.uri/r.jikan).toFixed(2)}</td>

      <td class="cj"><input type="number"></td>
      <td class="cj">—</td>
      <td class="cj"><input type="number"></td>
      <td class="cj">—</td>
      <td class="cj">—</td>

      <td class="cz">—</td>
      <td class="cz">—</td>
      <td class="cz">—</td>
      <td class="cz">—</td>

      <td class="ck"><input type="number"></td>
      <td class="ck">—</td>

      <td class="cn">—</td>
      <td class="cn">—</td>
    `;

    tbody.appendChild(tr);
  });
}

build();

</script>

</body>
</html>
